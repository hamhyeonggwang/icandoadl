<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADL 에디터 — 훈련 세션 저작</title>
<style>
  :root{
    --bg:#0f1115; --panel:#181b22; --panel2:#20242e; --line:#2b303c;
    --text:#e7e9ee; --muted:#8b93a7; --accent:#4fd1c5; --warn:#f6ad55;
    --danger:#fc8181; --ok:#68d391;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif;}
  header{display:flex; align-items:center; gap:12px; padding:10px 16px;
    border-bottom:1px solid var(--line); background:var(--panel);}
  header h1{font-size:15px; margin:0; white-space:nowrap;}
  header input#sessionTitle{flex:0 1 260px; font-family:inherit; font-size:14px; font-weight:600;
    background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:7px 10px;}
  header .spacer{flex:1;}
  #statusMsg{font-size:12px; font-weight:600;}
  button{font-family:inherit; font-size:13px; font-weight:600; padding:8px 12px; border-radius:8px;
    border:1px solid var(--line); background:var(--panel2); color:var(--text); cursor:pointer;}
  button:hover{border-color:var(--accent);}
  button.primary{background:var(--accent); color:#08201d; border-color:var(--accent);}
  button.danger{background:transparent; color:var(--danger); border-color:var(--danger); margin-top:8px;}
  button:disabled{opacity:.35; cursor:not-allowed;}
  label.fileBtn{font-size:13px; font-weight:600; padding:8px 12px; border-radius:8px;
    border:1px solid var(--line); background:var(--panel2); cursor:pointer;}
  label.fileBtn:hover{border-color:var(--accent);}
  label.fileBtn input{display:none;}

  main{flex:1; display:grid; grid-template-columns:250px 1fr 290px; gap:0; min-height:0;}
  .col{overflow-y:auto; padding:14px;}
  .col.left{border-right:1px solid var(--line); background:var(--panel);}
  .col.right{border-left:1px solid var(--line); background:var(--panel);}
  .col h2{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:0 0 10px;}

  .flowCard{display:flex; justify-content:space-between; align-items:center; gap:6px;
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    padding:9px 10px; margin-bottom:8px; cursor:pointer; font-size:13px;}
  .flowCard.sel{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent);}
  .flowCard .flowLabel{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .flowCard .flowBtns{display:flex; gap:3px; flex-shrink:0;}
  .flowCard .flowBtns button{padding:2px 6px; font-size:11px; border-radius:6px;}
  .addRow{display:flex; gap:8px; margin-top:10px;}
  .addRow button{flex:1;}

  .centerCol{display:flex; flex-direction:column; padding:14px; gap:12px; min-width:0;}
  #stageCanvas{position:relative; width:100%; aspect-ratio:16/9; background:
    linear-gradient(160deg,#1a2436,#12305a); border:1px solid var(--line); border-radius:12px;
    overflow:hidden; user-select:none;}
  #canvasHint{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:14px; text-align:center; padding:20px;}
  .canvasObj{position:absolute; transform:translate(-50%,-50%); cursor:grab; line-height:1;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,.5)); z-index:2;}
  .canvasObj.sel{outline:2px solid var(--accent); outline-offset:4px; border-radius:8px;}
  .canvasObj.isTarget{z-index:1;}
  .canvasObj.distract{opacity:.55;}
  .canvasObj.distract::after{content:'🙅'; position:absolute; top:-8px; right:-10px; font-size:13px;}
  .canvasObj.bimanual::after{content:'🙌'; position:absolute; top:-8px; right:-10px; font-size:13px;}
  .chk{display:flex; gap:6px; align-items:flex-start; font-size:12px; color:var(--text); line-height:1.4;}
  .fRow input[type=number]{font-family:inherit; font-size:13px; background:var(--panel2);
    color:var(--text); border:1px solid var(--line); border-radius:8px; padding:7px 9px;}
  .stepBox{border:1px solid var(--line); border-radius:10px; padding:10px; margin-bottom:10px; background:var(--panel2);}
  .stepHead{display:flex; justify-content:space-between; font-size:12px; font-weight:700; margin-bottom:8px;}
  .optRow{display:flex; gap:5px; align-items:center; margin-bottom:6px;}
  .optRow input[type=text]{flex:1; min-width:0; font-family:inherit; font-size:12px; background:var(--panel);
    color:var(--text); border:1px solid var(--line); border-radius:6px; padding:5px 7px;}
  .optRow .emojiIn{flex:0 0 40px; text-align:center;}
  .optRow label{font-size:13px; display:flex; align-items:center; gap:2px;}
  button.tiny{padding:3px 8px; font-size:11px; border-radius:6px;}
  button.tiny.wide{width:100%; margin-top:4px;}
  .cardPrev{width:14%; aspect-ratio:4/5; background:var(--panel2); border:1px solid var(--line);
    border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; font-size:13px !important; cursor:default;}
  .cardPrev.correctPrev{border-color:var(--ok);}
  .cpEmoji{font-size:26px;}
  .cpLabel{font-size:11px; color:var(--text);}
  .priceTag{position:absolute; top:-14px; left:50%; transform:translateX(-50%);
    background:#fff; color:#08201d; font-size:9px; font-weight:700; padding:1px 6px; border-radius:6px; white-space:nowrap;}
  .zoneCircle{position:absolute; transform:translate(-50%,-50%); border:2px dashed var(--accent);
    border-radius:50%; opacity:.6; pointer-events:none;}
  #palette{display:flex; flex-wrap:wrap; gap:8px;}
  .palItem{display:flex; flex-direction:column; align-items:center; gap:3px; width:74px; padding:8px 4px; position:relative;}
  .palDel{position:absolute; top:2px; right:4px; font-size:10px; color:var(--danger); cursor:pointer; padding:2px;}
  .palEmoji{font-size:24px;}
  .palTag{font-size:9px; color:var(--accent);}
  .hidden{display:none !important;}

  .fRow{display:flex; flex-direction:column; gap:5px; margin-bottom:12px; font-size:13px;}
  .fRow label{color:var(--muted); font-size:12px;}
  .fRow input[type=text], .fRow select{font-family:inherit; font-size:13px; background:var(--panel2);
    color:var(--text); border:1px solid var(--line); border-radius:8px; padding:7px 9px;}
  .fRow input[type=range]{width:100%;}
  #propsPanel h3{font-size:14px; margin:0 0 12px;}
  #propsPanel h4{font-size:12px; color:var(--muted); margin:16px 0 10px; text-transform:uppercase;}
  #propsPanel hr{border:none; border-top:1px solid var(--line); margin:16px 0;}
  .hint{color:var(--muted); font-size:12px; font-weight:400;}
</style>
</head>
<body>
<header>
  <h1>🛠 ADL 에디터</h1>
  <input type="text" id="sessionTitle" placeholder="세션 이름">
  <div class="spacer"></div>
  <span id="statusMsg"></span>
  <button id="btnNew">새 세션</button>
  <label class="fileBtn">JSON 불러오기<input type="file" id="fileLoad" accept=".json,application/json"></label>
  <button id="btnSaveJson">JSON 저장</button>
  <button id="btnPreview">▶ 미리보기</button>
  <button id="btnCopyLink" class="primary">🔗 실행 링크 복사</button>
</header>

<main>
  <div class="col left">
    <h2>세션 플로우</h2>
    <div id="flowList"></div>
    <div class="addRow">
      <button id="btnAddSegment">+ 이동</button>
      <button id="btnAddCrossing">+ 횡단보도</button>
    </div>
    <div class="addRow">
      <button id="btnAddStation">+ 옮기기</button>
      <button id="btnAddSelect">+ 고르기</button>
    </div>
  </div>

  <div class="centerCol">
    <div id="stageCanvas">
      <div id="canvasHint">스테이션을 선택하면 화면 배치를 편집할 수 있어요.</div>
    </div>
    <div>
      <div style="display:flex; align-items:center; gap:10px; margin:0 0 8px;">
        <h2 style="font-size:12px; color:var(--muted); margin:0;">사물 라이브러리 — 눌러서 추가</h2>
        <label class="fileBtn" style="font-size:11px; padding:5px 9px;">+ 내 3D 모델 (GLB)<input type="file" id="fileGlb" accept=".glb,model/gltf-binary"></label>
      </div>
      <div id="palette"></div>
    </div>
  </div>

  <div class="col right">
    <h2>속성</h2>
    <div id="propsPanel"></div>
  </div>
</main>

<script type="module" src="./js/editor-app.js"></script>
</body>
</html>
