<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADL 러너 — 3D 훈련 세션</title>
<style>
  :root{
    --bg:#0f1115; --panel:rgba(24,27,34,.82); --line:#2b303c;
    --text:#e7e9ee; --muted:#8b93a7; --accent:#4fd1c5; --warn:#f6ad55;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif; overflow:hidden;}
  #stage{position:fixed; inset:0;}
  #videoWrap{position:absolute; inset:0; background:linear-gradient(160deg,#1a2436,#12305a);}
  #videoWrap video{width:100%; height:100%; object-fit:cover; filter:brightness(.85);}
  #videoWrap video.mirror{transform:scaleX(-1);}
  #glcanvas{position:absolute; inset:0; width:100%; height:100%; display:block;}
  .hidden{display:none !important;}

  .overlay{
    position:absolute; inset:0; z-index:20; background:rgba(10,12,16,.9);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px; gap:14px;
  }
  .overlay h1{font-size:30px; margin:0;}
  .overlay p{font-size:15px; color:var(--muted); max-width:520px; margin:0; line-height:1.6;}
  .overlay .count{font-size:64px; font-weight:800; color:var(--accent); min-height:76px;}
  button.big{
    font-family:inherit; font-size:20px; font-weight:700; padding:16px 44px; border-radius:16px;
    border:none; background:var(--accent); color:#08201d; cursor:pointer;
  }
  button.big:disabled{opacity:.5; cursor:not-allowed;}
  button.big.ghost{background:var(--panel); color:var(--text); border:1px solid var(--accent);}
  .startBtns{display:flex; gap:12px; flex-wrap:wrap; justify-content:center;}

  /* 과제 선택 메뉴 */
  #stageMenu{justify-content:flex-start; padding-top:5vh;}
  #stageMenu h1{font-size:26px;}
  .menuHint{font-size:14px; color:var(--muted);}
  .menuBack{position:absolute; top:18px; left:18px; font-family:inherit; font-size:14px; font-weight:600;
    background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:10px;
    padding:8px 14px; cursor:pointer;}
  .menuBack:hover{border-color:var(--accent);}
  #stageToast{font-size:17px; font-weight:800; color:var(--accent);
    background:rgba(79,209,197,.12); border:1px solid var(--accent); border-radius:12px; padding:8px 20px;}
  #stageGrid{display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
    gap:12px; width:min(880px, 92vw); max-height:74vh; overflow-y:auto; padding:4px;}
  .stageCard{display:flex; flex-direction:column; gap:6px; text-align:left; cursor:pointer;
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px;
    transition:border-color .15s, transform .1s;}
  .stageCard:hover{border-color:var(--accent); transform:translateY(-2px);}
  .stageCard.calib{border-color:var(--warn); border-style:dashed;}
  .stageCard.doneOnce{opacity:.75;}
  .stageCard .scTop{display:flex; align-items:center; gap:9px;}
  .stageCard .scEmoji{font-size:30px; line-height:1;}
  .stageCard .scTitle{font-size:15px; font-weight:700;}
  .stageCard .scType{font-size:11px; color:var(--muted); font-weight:600;}
  .stageCard .scCog{display:flex; flex-wrap:wrap; gap:4px; margin-top:2px;}
  .stageCard .cog{font-size:10px; font-weight:600; padding:2px 7px; border-radius:999px;
    background:var(--panel2, #20242e); color:var(--muted); border:1px solid var(--line);}
  .stageCard .scStars{font-size:12px; min-height:14px; color:var(--warn);}
  .fileOpen{font-size:13px; color:var(--muted); cursor:pointer; border:1px solid var(--line);
    padding:8px 16px; border-radius:10px; background:var(--panel);}
  .fileOpen:hover{color:var(--text); border-color:var(--accent);}
  .fileOpen input{display:none;}
  #reportBox{max-width:640px; width:90%; max-height:34vh; overflow-y:auto; text-align:left;
    background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 16px;}
  #reportBox h3{font-size:13px; margin:0 0 8px; color:var(--text);}
  #reportBox .c2note{font-size:11px; color:var(--muted); font-weight:400;}
  #reportBox .repRow{font-size:12px; color:var(--muted); padding:4px 0; border-top:1px solid var(--line); line-height:1.5;}
  #reportBtns{display:flex; gap:8px;}
  button.mini{font-family:inherit; font-size:12px; font-weight:600; padding:8px 14px; border-radius:8px;
    border:1px solid var(--line); background:var(--panel); color:var(--text); cursor:pointer;}
  button.mini:hover{border-color:var(--accent);}

  #hud{position:absolute; top:0; left:0; right:0; z-index:10; padding:14px 18px;
    display:flex; flex-direction:column; gap:8px; pointer-events:none;}
  #hudInstruction{
    align-self:center; background:var(--panel); border:1px solid var(--line); backdrop-filter:blur(6px);
    padding:10px 22px; border-radius:999px; font-size:19px; font-weight:700;
  }
  #hudBar{align-self:center; width:min(420px,70vw); height:10px; border-radius:6px;
    background:rgba(0,0,0,.45); overflow:hidden; border:1px solid var(--line);}
  #hudProgressFill{height:100%; width:0%; background:var(--accent); border-radius:6px; transition:width .2s;}
  #hudStep{align-self:center; font-size:13px; color:var(--muted); font-weight:600;}

  #banner{position:absolute; top:38%; left:0; right:0; z-index:15; text-align:center;
    font-size:46px; font-weight:800; text-shadow:0 4px 18px rgba(0,0,0,.6); pointer-events:none;}
  #assistBadge{position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:10;
    background:var(--warn); color:#3a2400; font-size:14px; font-weight:700;
    padding:8px 18px; border-radius:999px; pointer-events:none;}
  #fpsBadge{position:absolute; top:12px; right:14px; z-index:10; font-size:11px; color:var(--muted);
    background:var(--panel); padding:3px 8px; border-radius:6px; border:1px solid var(--line);}
  #placeChip{position:absolute; top:12px; left:14px; z-index:10; font-size:14px; font-weight:800;
    color:#fff; padding:7px 16px; border-radius:999px; text-shadow:0 1px 3px rgba(0,0,0,.5);
    box-shadow:0 3px 10px rgba(0,0,0,.35);}
  #fade{position:absolute; inset:0; z-index:18; background:#0f1115; opacity:0;
    transition:opacity .4s; pointer-events:none;}
  #fade.on{opacity:1;}
</style>
</head>
<body>
<div id="stage">
  <div id="videoWrap" class="hidden"></div>
  <canvas id="glcanvas"></canvas>

  <div id="hud" class="hidden">
    <div id="hudInstruction">준비</div>
    <div id="hudBar"><div id="hudProgressFill"></div></div>
    <div id="hudStep"></div>
  </div>

  <div id="placeChip" class="hidden"></div>
  <div id="banner" class="hidden"></div>
  <div id="assistBadge" class="hidden"></div>
  <div id="fpsBadge">FPS —</div>
  <div id="fade"></div>

  <div id="startOverlay" class="overlay">
    <h1 id="startTitle">ADL 훈련 세션</h1>
    <p id="startDesc">불러오는 중…</p>
    <div class="startBtns">
      <button id="btnStart" class="big">🌟 전체 하루 시작</button>
      <button id="btnChoose" class="big ghost">🎯 과제 골라 연습</button>
    </div>
    <label id="btnOpenFile" class="fileOpen">📂 세션 파일 열기<input type="file" id="fileSession" accept=".json,application/json"></label>
    <div id="reportBox" class="hidden"></div>
    <div id="reportBtns" class="hidden">
      <button id="btnSaveJson" class="mini">📄 리포트 JSON</button>
      <button id="btnSaveCsv" class="mini">📊 리포트 CSV</button>
    </div>
  </div>

  <div id="stageMenu" class="overlay hidden">
    <button id="btnMenuBack" class="menuBack">‹ 뒤로</button>
    <h1>🎯 과제 골라 연습</h1>
    <p class="menuHint">연습하고 싶은 과제를 골라요. 하나를 끝내면 다시 여기로 돌아와요.</p>
    <div id="stageToast" class="hidden"></div>
    <div id="stageGrid"></div>
  </div>

  <div id="calibOverlay" class="overlay hidden">
    <h1 id="calibTitle">캘리브레이션</h1>
    <p id="calibDesc"></p>
    <div id="calibCount" class="count"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/",
    "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs"
  }
}
</script>
<script type="module" src="./js/runner-app.js"></script>
</body>
</html>
